<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocShare — Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface2: #1e1e1e;
        --border: #2a2a2a;
        --accent: #c8f542;
        --accent-dim: #a0c430;
        --text: #f0f0f0;
        --muted: #666;
        --fail: #f56042;
        --pass: #42f5a7;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        gap: 1rem;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .logo {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--accent);
      }
      .logo span {
        color: var(--text);
      }
      .badge {
        margin-left: auto;
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        padding: 0.3rem 0.8rem;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .badge.live {
        border-color: rgba(66, 245, 167, 0.4);
        color: var(--pass);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }
      .dot.live {
        background: var(--pass);
        box-shadow: 0 0 0 3px rgba(66, 245, 167, 0.2);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(66, 245, 167, 0.4);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(66, 245, 167, 0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 340px 1fr;
        height: calc(100vh - 57px);
      }
      aside {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-inner {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .sidebar-inner::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar-inner::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .panel {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .panel-head {
        padding: 0.7rem 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.65rem;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .panel-body {
        padding: 1rem;
      }

      .link-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem 0.9rem;
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--accent);
        word-break: break-all;
        line-height: 1.5;
        min-height: 48px;
      }

      button {
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
        padding: 0.65rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        width: 100%;
        margin-top: 0.5rem;
      }
      button:hover {
        background: var(--border);
      }
      button:active {
        transform: scale(0.98);
      }
      button.primary {
        background: var(--accent);
        color: #0a0a0a;
        border-color: var(--accent);
        font-weight: 600;
      }
      button.primary:hover {
        background: var(--accent-dim);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #statusMsg {
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.5rem;
        min-height: 1rem;
        line-height: 1.5;
      }
      #copyMsg {
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--pass);
        margin-top: 0.4rem;
        min-height: 1rem;
      }

      .loc-row {
        display: flex;
        justify-content: space-between;
        padding: 0.4rem 0;
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
      }
      .loc-row:last-child {
        border-bottom: none;
      }
      .loc-row span:last-child {
        color: var(--text);
        text-align: right;
      }
      .loc-address {
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--text);
        line-height: 1.6;
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .last-seen {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
      }

      .steps {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.85rem;
      }
      .step {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .step-n {
        min-width: 20px;
        height: 20px;
        background: var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        color: var(--text);
        flex-shrink: 0;
        margin-top: 1px;
      }

      #friendPanel {
        display: none;
      }
      #friendPanel.visible {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      #map {
        flex: 1;
        filter: brightness(1.05) saturate(0.9);
      }

      .leaflet-popup-content-wrapper {
        background: var(--surface) !important;
        color: var(--text) !important;
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        font-family: "DM Mono", monospace !important;
        font-size: 0.75rem !important;
        box-shadow: none !important;
      }
      .leaflet-popup-tip {
        background: var(--surface) !important;
      }

      @media (max-width: 700px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
          height: auto;
        }
        aside {
          max-height: 55vh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        #map {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        Loc<span>Share</span>
        <span
          style="
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--muted);
            font-family: &quot;DM Mono&quot;, monospace;
          "
          >viewer</span
        >
      </div>
      <div class="badge" id="liveBadge">
        <div class="dot" id="liveDot"></div>
        <span id="liveText">Waiting…</span>
      </div>
    </header>

    <main>
      <aside>
        <div class="sidebar-inner">
          <div class="panel">
            <div class="panel-head">Step 1 — Create session</div>
            <div class="panel-body">
              <button class="primary" id="createBtn" onclick="createSession()">
                Generate share link
              </button>
              <div id="statusMsg">Click to create a session.</div>
            </div>
          </div>

          <div class="panel" id="sharePanel" style="display: none">
            <div class="panel-head">Step 2 — Send link to your friend</div>
            <div class="panel-body">
              <div class="link-box" id="shareLink">—</div>
              <button onclick="copyLink()">Copy link</button>
              <div id="copyMsg"></div>
              <div class="steps">
                <div class="step">
                  <span class="step-n">1</span
                  ><span>Copy and send the link above</span>
                </div>
                <div class="step">
                  <span class="step-n">2</span
                  ><span>She opens it on her phone and taps Allow</span>
                </div>
                <div class="step">
                  <span class="step-n">3</span
                  ><span>Her pin appears here in real time</span>
                </div>
              </div>
            </div>
          </div>

          <div class="panel" id="friendPanel">
            <div class="panel-head">Friend's Location</div>
            <div class="panel-body">
              <div class="loc-address" id="friendAddress">
                Waiting for connection…
              </div>
              <div class="loc-row">
                <span>Latitude</span><span id="friendLat">—</span>
              </div>
              <div class="loc-row">
                <span>Longitude</span><span id="friendLon">—</span>
              </div>
              <div class="loc-row">
                <span>Accuracy</span><span id="friendAcc">—</span>
              </div>
              <div class="last-seen" id="lastSeen">—</div>
            </div>
          </div>
        </div>
      </aside>
      <div id="map"></div>
    </main>

    <script>
      // ── Map ──────────────────────────────────────────────
      const map = L.map("map");
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        {
          attribution: "© OpenStreetMap © CARTO",
          subdomains: "abcd",
          maxZoom: 19,
        },
      ).addTo(map);
      map.setView([14.5995, 120.9842], 13);

      const friendIcon = L.divIcon({
        className: "",
        html: `<div style="width:16px;height:16px;background:#f56042;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(245,96,66,0.5)"></div>`,
        iconAnchor: [8, 8],
      });

      let friendMarker = null;
      let peer = null;
      let sessionLink = "";

      // ── Create PeerJS session ────────────────────────────
      function createSession() {
        const btn = document.getElementById("createBtn");
        btn.disabled = true;
        btn.textContent = "Connecting…";
        setStatus("Connecting to signaling server…");

        // Create a Peer with a random ID
        peer = new Peer({ debug: 0 });

        peer.on("open", (id) => {
          // Build the sender URL using our peer ID
          const base = `${window.location.origin}/sender.html`;
          sessionLink = `${base}?peer=${id}`;

          document.getElementById("shareLink").textContent = sessionLink;
          document.getElementById("sharePanel").style.display = "block";
          document.getElementById("friendPanel").classList.add("visible");

          btn.textContent = "✓ Waiting for friend";
          setStatus(`Session ready. Peer ID: ${id}`);
        });

        // Listen for incoming data connection from sender
        peer.on("connection", (conn) => {
          setStatus("Friend connected! Waiting for location…");
          document.getElementById("liveText").textContent = "Connected";

          conn.on("data", (data) => {
            if (data.type === "location") {
              updateFriendLocation(data);
            }
          });

          conn.on("close", () => {
            document.getElementById("liveText").textContent = "Disconnected";
            document.getElementById("liveBadge").classList.remove("live");
            document.getElementById("liveDot").classList.remove("live");
            setStatus("Friend disconnected.");
          });
        });

        peer.on("error", (err) => {
          btn.disabled = false;
          btn.textContent = "Generate share link";
          setStatus(`⚠ ${err.message}`, true);
        });
      }

      async function updateFriendLocation({ lat, lon, accuracy, timestamp }) {
        // Update map marker
        if (friendMarker) {
          friendMarker.setLatLng([lat, lon]);
        } else {
          friendMarker = L.marker([lat, lon], { icon: friendIcon })
            .addTo(map)
            .bindPopup("Your friend is here")
            .openPopup();
          map.setView([lat, lon], 16);
        }

        // Sidebar
        document.getElementById("friendLat").textContent =
          parseFloat(lat).toFixed(6);
        document.getElementById("friendLon").textContent =
          parseFloat(lon).toFixed(6);
        document.getElementById("friendAcc").textContent =
          `±${Math.round(accuracy)} m`;
        document.getElementById("lastSeen").textContent =
          `Last updated: ${new Date(timestamp).toLocaleTimeString()}`;

        // Live badge
        document.getElementById("liveBadge").classList.add("live");
        document.getElementById("liveDot").classList.add("live");
        document.getElementById("liveText").textContent = "Live";

        // Reverse geocode
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers: { "Accept-Language": "en" } },
          );
          const data = await res.json();
          document.getElementById("friendAddress").textContent =
            data.display_name ?? "Address unavailable";
        } catch {
          document.getElementById("friendAddress").textContent =
            "Address unavailable";
        }
      }

      function copyLink() {
        navigator.clipboard.writeText(sessionLink).then(() => {
          document.getElementById("copyMsg").textContent = "✓ Copied!";
          setTimeout(
            () => (document.getElementById("copyMsg").textContent = ""),
            2500,
          );
        });
      }

      function setStatus(msg, isError) {
        const el = document.getElementById("statusMsg");
        el.textContent = msg;
        el.style.color = isError ? "var(--fail)" : "var(--muted)";
      }
    </script>
  </body>
</html>
